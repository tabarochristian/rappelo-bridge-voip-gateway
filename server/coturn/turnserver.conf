# coturn TURN/STUN server configuration for Rappelo Bridge
# This enables NAT traversal for mobile SIP clients

# Listening port
listening-port=3478
tls-listening-port=5349

# Relay port range
min-port=49152
max-port=65535

# Use fingerprint in TURN message
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Realm
realm=COTURN_REALM_PLACEHOLDER

# Server name  
server-name=rappelo-turn

# Static auth secret (set via environment)
use-auth-secret
static-auth-secret=COTURN_AUTH_SECRET_PLACEHOLDER

# Total relay bandwidth limit (in bits per second)
total-quota=100

# Max bandwidth per session (bytes per second)  
bps-capacity=0

# Deny loopback/private addresses for relay (security)
no-multicast-peers

# Logging
log-file=stdout
verbose

# Stale nonce lifetime (seconds)
stale-nonce=600

# No CLI
no-cli
