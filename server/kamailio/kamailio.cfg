##
## Kamailio Configuration for Rappelo Bridge VoIP Gateway
## Optimized for mobile SIP client registration and call routing
##

## ========================================
## Global Parameters
## ========================================

#!ifdef WITH_DEBUG
debug=4
log_stderror=yes
#!else
debug=2
log_stderror=no
#!endif

memdbg=5
memlog=5
log_facility=LOG_LOCAL0
log_prefix="{$mt $hdr(CSeq) $ci} "

# Number of child processes
children=4

# Listen on all interfaces
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
#!ifdef WITH_TLS
listen=tls:0.0.0.0:5061
#!endif
listen=udp:0.0.0.0:5080
listen=tcp:0.0.0.0:5080

# Advertise public IP if set via environment
#!ifdef WITH_ADVERTISED_ADDRESS
listen=udp:0.0.0.0:5060 advertise ADVERTISED_ADDRESS:5060
#!endif

# Life time of TCP connections
tcp_connection_lifetime=3604
tcp_accept_no_cl=yes

# Disable DNS SRV for better startup in Docker
dns=no
rev_dns=no

# Auto aliases
auto_aliases=no

# Server header
server_header="Server: Rappelo-SIP"
user_agent_header="User-Agent: Rappelo-SIP"

## ========================================
## Module Loading
## ========================================

# Auto-detect module path (works on x86_64 and aarch64)
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

# -- Core modules --
loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "textopsx.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "sdpops.so"

# -- Authentication --
loadmodule "auth.so"
loadmodule "auth_db.so"

# -- Database --
loadmodule "db_postgres.so"

# -- NAT Traversal --
loadmodule "nathelper.so"
loadmodule "rtpengine.so"

# -- Dialog tracking --
loadmodule "dialog.so"

# -- Accounting --
loadmodule "acc.so"

# -- Security --
loadmodule "pike.so"
loadmodule "htable.so"

# -- Domain --
loadmodule "domain.so"

# -- UAC (outbound trunk registration) --
loadmodule "uac.so"

#!ifdef WITH_TLS
loadmodule "tls.so"
#!endif

## ========================================
## Module Parameters
## ========================================

# ----- jsonrpcs params -----
modparam("jsonrpcs", "pretty_format", 1)
modparam("jsonrpcs", "fifo_name", "/run/kamailio/kamailio_rpc.fifo")

# ----- tm params -----
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# ----- rr params -----
modparam("rr", "enable_full_lr", 0)
modparam("rr", "append_fromtag", 0)

# ----- database url -----
#!subst "|DBURL|postgres://KAMAILIO_DB_USER:KAMAILIO_DB_PASSWORD@postgres:5432/KAMAILIO_DB_NAME|"

# ----- registrar params -----
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "min_expires", 60)
modparam("registrar", "default_expires", 300)
modparam("registrar", "gruu_enabled", 0)
# Keep registrations alive for mobile devices
modparam("registrar", "received_avp", "$avp(RECEIVED)")

# ----- usrloc params -----
modparam("usrloc", "db_url", "DBURL")
modparam("usrloc", "db_mode", 2)  # Write-through
modparam("usrloc", "nat_bflag", 6)
modparam("usrloc", "use_domain", 1)

# ----- auth_db params -----
modparam("auth_db", "db_url", "DBURL")
modparam("auth_db", "calculate_ha1", 0)
modparam("auth_db", "password_column", "ha1")
modparam("auth_db", "load_credentials", "")
modparam("auth_db", "use_domain", 1)

# ----- domain params -----
modparam("domain", "db_url", "DBURL")
modparam("domain", "register_myself", 1)

# ----- dialog params -----
modparam("dialog", "db_url", "DBURL")
modparam("dialog", "db_mode", 1)
modparam("dialog", "dlg_flag", 4)
modparam("dialog", "default_timeout", 43200)

# ----- acc params -----
modparam("acc", "db_url", "DBURL")
modparam("acc", "early_media", 0)
modparam("acc", "report_ack", 0)
modparam("acc", "report_cancels", 0)
modparam("acc", "detect_direction", 0)
modparam("acc", "log_flag", 1)
modparam("acc", "log_missed_flag", 2)
modparam("acc", "db_flag", 1)
modparam("acc", "db_missed_flag", 2)
modparam("acc", "log_extra", "src_user=$fU;src_domain=$fd;src_ip=$si;dst_ouser=$tU;dst_user=$rU;dst_domain=$rd")
modparam("acc", "db_extra", "src_user=$fU;src_domain=$fd;src_ip=$si;dst_ouser=$tU;dst_user=$rU;dst_domain=$rd")

# ----- nathelper params -----
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "sipping_bflag", 7)
modparam("nathelper", "sipping_from", "sip:pinger@KAMAILIO_SIP_DOMAIN")
modparam("nathelper", "received_avp", "$avp(RECEIVED)")

# ----- rtpengine params -----
modparam("rtpengine", "rtpengine_sock", "udp:rtpengine:22222")

# ----- pike (anti-flood) params -----
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 32)
modparam("pike", "remove_latency", 4)

# ----- htable params (IP ban table) -----
modparam("htable", "htable", "ipban=>size=8;autoexpire=300;")

# ----- uac params (Twilio SIP trunk) -----
#!ifdef WITH_TWILIO
modparam("uac", "restore_mode", "auto")
#!endif

# ----- Twilio trunk config via htable -----
# Trunk URI set by entrypoint: e.g. sip:your-trunk.pstn.twilio.com
#!ifdef WITH_TWILIO
modparam("htable", "htable", "twilio=>size=4;")
#!endif

#!ifdef WITH_TLS
# ----- tls params -----
modparam("tls", "config", "/etc/kamailio/tls.cfg")
#!endif

## ========================================
## Routing Logic
## ========================================

# Main request routing
request_route {

    # Per-request initial checks
    route(REQINIT);

    # NAT detection
    route(NATDETECT);

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # Handle retransmissions
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Record-Route for dialog-forming requests
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Handle requests within existing SIP dialogs
    route(WITHINDLG);

    # -- Only initial requests past this point --

    # Authentication
    if (is_method("REGISTER") || from_uri!=myself) {
        #!ifdef WITH_TWILIO
        # Skip auth for inbound from Twilio signaling IPs
        # Twilio US: 54.172.60.0/30, 54.244.51.0/30, 34.203.250.0/23
        # Twilio EU: 54.171.127.192/30, 35.156.191.128/30
        # Twilio global edge: 168.86.128.0/18
        if (is_method("INVITE") && ($si=~"^54\.172\.60\." || $si=~"^54\.244\.51\."
            || $si=~"^34\.203\.25[01]\." || $si=~"^54\.171\.127\."
            || $si=~"^35\.156\.191\." || $si=~"^168\.86\.")) {
            xlog("L_INFO", "TWILIO INBOUND from $si:$sp - skipping auth\n");
            route(TWILIO_INBOUND);
            exit;
        }
        #!endif
        route(AUTH);
    }

    # Remove preloaded route headers
    remove_hf("Route");

    # Handle REGISTER
    if (is_method("REGISTER")) {
        route(REGISTRAR);
        exit;
    }

    if ($rU==$null) {
        # Request with no Username in RURI
        sl_send_reply("484", "Address Incomplete");
        exit;
    }

    # Enable dialog tracking and accounting for INVITEs
    if (is_method("INVITE")) {
        setflag(1);  # accounting
        setflag(2);  # missed calls
        setflag(4);  # dialog tracking
    }

    # User location lookup
    route(LOCATION);
}

# Wrapper for relaying requests
route[RELAY] {
    # Enable additional event routes for forwarded requests
    if (is_method("INVITE|BYE|SUBSCRIBE|UPDATE")) {
        if (!t_is_set("branch_route")) {
            t_on_branch("MANAGE_BRANCH");
        }
    }

    if (is_method("INVITE|SUBSCRIBE|UPDATE")) {
        if (!t_is_set("onreply_route")) {
            t_on_reply("MANAGE_REPLY");
        }
    }

    if (is_method("INVITE")) {
        t_on_failure("MANAGE_FAILURE");
    }

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# Per-request initial checks
route[REQINIT] {
    # Flood detection with pike
    if (src_ip!=myself) {
        if ($sht(ipban=>$si)!=$null) {
            # Already banned
            xdbg("request from blocked IP - $rm from $fu (IP:$si:$sp)\n");
            exit;
        }

        if (!pike_check_req()) {
            xlog("L_ALERT", "PIKE: blocking $rm from $fu (IP:$si:$sp)\n");
            $sht(ipban=>$si) = 1;
            exit;
        }
    }

    # Sanity checks
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (is_method("OPTIONS") && uri==myself && $rU==$null) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP message from $si:$sp\n");
        exit;
    }
}

# Handle requests within SIP dialogs
route[WITHINDLG] {
    if (!has_totag()) return;

    if (loose_route()) {
        if (is_method("BYE")) {
            setflag(1);  # accounting
        } else if (is_method("ACK")) {
            # ACK is forwarded statelessly
            route(NATMANAGE);
        } else if (is_method("NOTIFY")) {
            # Subscriptions within dialog
            record_route();
        }
        route(RELAY);
        exit;
    }

    if (is_method("SUBSCRIBE") && uri==myself) {
        # In-dialog subscribe requests
        route(AUTH);
        exit;
    }

    if (is_method("ACK")) {
        if (t_check_trans()) {
            # No loose route, but stateful ACK
            route(RELAY);
            exit;
        } else {
            # ACK without matching transaction... ignore and discard
            exit;
        }
    }

    sl_send_reply("404", "Not Here");
    exit;
}

# Authentication route
route[AUTH] {
    if (is_method("REGISTER") || from_uri!=myself) {
        # Digest authentication
        if (!auth_check("$fd", "subscriber", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        # User authenticated
        consume_credentials();
    }
}

# Registration handling
route[REGISTRAR] {
    if (!save("location")) {
        sl_reply_error();
    }

    xlog("L_INFO", "REGISTER from $fu ($si:$sp) - contact: $ct\n");
    exit;
}

# User location lookup
route[LOCATION] {
    if (!lookup("location")) {
        $var(rc) = $rc;

        #!ifdef WITH_TWILIO
        # If user not found locally, try Twilio trunk for PSTN routing
        if (is_method("INVITE") && $var(rc) == -1) {
            # Check if destination looks like a phone number (E.164 or national)
            if ($rU =~ "^\\+?[0-9]{7,15}$") {
                xlog("L_INFO", "TWILIO: routing $rU to Twilio trunk from $fu\n");
                route(TWILIO);
                exit;
            }
        }
        #!endif

        t_newtran();
        switch ($var(rc)) {
            case -1:
            case -3:
                xlog("L_INFO", "User not found: $rU@$rd from $fu\n");
                send_reply("404", "Not Found");
                exit;
            case -2:
                send_reply("405", "Method Not Allowed");
                exit;
        }
    }

    # Destination behind NAT
    route(NATMANAGE);
    route(RELAY);
    exit;
}

# NAT detection
route[NATDETECT] {
    force_rport();
    if (nat_uac_test("19")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
            setbflag(6);  # NAT flag for usrloc
        } else {
            if (is_first_hop()) {
                set_contact_alias();
            }
        }
        setflag(5);  # NAT flag for this transaction
    }
    return;
}

# NAT management for in-dialog requests
route[NATMANAGE] {
    if (is_request()) {
        if (has_totag()) {
            if (check_route_param("nat=yes")) {
                setbflag(6);
            }
        }
    }

    if (!(isflagset(5) || isbflagset(6))) return;

    # RTPEngine for media relay
    if (is_method("INVITE|UPDATE|ACK|BYE|CANCEL")) {
        if (has_body("application/sdp")) {
            rtpengine_manage("replace-origin replace-session-connection ICE=force-relay RTP/AVP");
        }
    }

    if (is_request()) {
        if (!has_totag()) {
            if (is_method("INVITE")) {
                add_rr_param(";nat=yes");
            }
        }
    }

    if (is_reply()) {
        if (isbflagset(6)) {
            if (has_body("application/sdp")) {
                rtpengine_manage("replace-origin replace-session-connection ICE=force-relay RTP/AVP");
            }
        }
    }
    return;
}

# Manage outgoing branches
branch_route[MANAGE_BRANCH] {
    xdbg("new branch [$T_branch_idx] to $ru\n");
    route(NATMANAGE);
}

# Manage incoming replies
onreply_route[MANAGE_REPLY] {
    xdbg("incoming reply\n");
    if (status=~"[12][0-9][0-9]") {
        route(NATMANAGE);
    }
}

# Manage failure routing cases
failure_route[MANAGE_FAILURE] {
    route(NATMANAGE);

    if (t_is_canceled()) {
        exit;
    }
}

## ========================================
## Event Routes
## ========================================
event_route[tm:local-request] {
    xdbg("local request $rm to $ru\n");
}

## ========================================
## Twilio SIP Trunk Routing
## ========================================

#!ifdef WITH_TWILIO

# Outbound: Route calls to PSTN via Twilio Elastic SIP Trunking
route[TWILIO] {
    # Set destination to Twilio trunk
    # TWILIO_TERMINATION_URI is substituted by entrypoint.sh
    # Format: your-trunk-name.pstn.twilio.com
    $du = "sip:" + $rU + "@TWILIO_TERMINATION_URI";

    # Add accounting flags
    setflag(1);
    setflag(4);

    # Add a custom header for tracking
    append_hf("X-Rappelo-Trunk: twilio\r\n");

    xlog("L_INFO", "TWILIO OUTBOUND: $fU -> $rU via $du\n");

    t_on_failure("TWILIO_FAILURE");
    route(RELAY);
    exit;
}

# Inbound: Accept calls from Twilio and route to local subscribers
route[TWILIO_INBOUND] {
    # Twilio sends calls to your server for incoming DID numbers
    # The To header contains the DID, the Request-URI should be rewritten
    # to the local subscriber who should receive the call

    xlog("L_INFO", "TWILIO INBOUND: $fU@$fd -> $tU@$td ($si:$sp)\n");

    # Look up the destination user locally
    if (!lookup("location")) {
        xlog("L_WARN", "TWILIO INBOUND: no local user for $rU\n");
        sl_send_reply("404", "Not Found");
        exit;
    }

    setflag(1);  # accounting
    setflag(4);  # dialog tracking

    route(NATMANAGE);
    route(RELAY);
    exit;
}

# Twilio failure handling
failure_route[TWILIO_FAILURE] {
    if (t_is_canceled()) exit;

    xlog("L_WARN", "TWILIO FAILURE: $rU status=$rs reason=$rr\n");

    # On Twilio failure, return a meaningful error to the caller
    if (t_check_status("403")) {
        send_reply("403", "Trunk Authentication Failed");
        exit;
    }
    if (t_check_status("404|604")) {
        send_reply("404", "Number Not Found");
        exit;
    }
}

#!endif
